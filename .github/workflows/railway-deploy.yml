name: Deploy to Railway

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.changes.outputs.frontend }}
      server: ${{ steps.changes.outputs.server }}
      worker: ${{ steps.changes.outputs.worker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            frontend:
              - 'packages/twenty-front/**'
              - 'packages/twenty-ui/**'
              - 'packages/twenty-shared/**'
              - 'packages/twenty-utils/**'
              - 'railway-front.json'
            server:
              - 'packages/twenty-server/**'
              - 'packages/twenty-shared/**'
              - 'packages/twenty-emails/**'
              - 'packages/twenty-utils/**'
              - 'railway-server.json'
            worker:
              - 'packages/twenty-server/**'
              - 'packages/twenty-shared/**'
              - 'packages/twenty-emails/**'
              - 'packages/twenty-utils/**'
              - 'railway-worker.json'

  deploy-frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Frontend to Railway
        run: |
          export RAILWAY_CONFIG_FILE=railway-front.json
          railway up --service twenty-front
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-server:
    needs: changes
    if: ${{ needs.changes.outputs.server == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Server to Railway
        run: |
          export RAILWAY_CONFIG_FILE=railway-server.json
          railway up --service twenty-server
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-worker:
    needs: changes
    if: ${{ needs.changes.outputs.worker == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Worker to Railway
        run: |
          export RAILWAY_CONFIG_FILE=railway-worker.json
          railway up --service twenty-worker
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  health-check:
    needs: [deploy-frontend, deploy-server, deploy-worker]
    if: always() && (needs.deploy-frontend.result == 'success' || needs.deploy-server.result == 'success' || needs.deploy-worker.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployments
        run: sleep 60

      - name: Health Check Frontend
        if: ${{ needs.deploy-frontend.result == 'success' }}
        run: |
          curl -f ${{ vars.FRONTEND_URL }}/health || exit 1

      - name: Health Check Server
        if: ${{ needs.deploy-server.result == 'success' }}
        run: |
          curl -f ${{ vars.SERVER_URL }}/healthz || exit 1

      - name: Notify deployment status
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: |
            Railway deployment completed!
            Frontend: ${{ needs.deploy-frontend.result }}
            Server: ${{ needs.deploy-server.result }}
            Worker: ${{ needs.deploy-worker.result }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}